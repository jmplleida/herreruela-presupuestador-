<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6e3eb5">
  <title>Herreruela — Presupuestador</title>

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Herreruela">

  <!-- jsPDF para exportar PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --h: #6e3eb5;
      --hd: #3c2080;
      --hl: #f0ebfc;
      --acc: #b06ad4;
      --acc2: #8b44c8;
      --bg: #f5f3f9;
      --surf: #ffffff;
      --surf2: #f7f5fc;
      --txt: #1a1a1a;
      --muted: #666666;
      --brd: rgba(0,0,0,0.08);
      --brd2: rgba(0,0,0,0.14);
      --r: 12px;
      --rs: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); min-height: 100vh; }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, var(--hd) 0%, var(--h) 55%, var(--acc) 100%);
      padding: 16px 16px 18px;
      position: relative;
      overflow: hidden;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header::before { content: ''; position: absolute; top: -40px; right: -20px; width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,0.05); }
    .header::after  { content: ''; position: absolute; bottom: -25px; left: 60px; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,0.04); }
    .header-inner { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
    .logo-img { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0; }
    .brand-name { font-size: 17px; font-weight: 600; color: #fff; letter-spacing: 0.2px; line-height: 1.15; }
    .brand-sub  { font-size: 10px; color: rgba(255,255,255,0.65); letter-spacing: 0.9px; text-transform: uppercase; margin-top: 2px; }
    .vstatus {
      margin-left: auto;
      background: rgba(255,255,255,0.13);
      border: 0.5px solid rgba(255,255,255,0.22);
      color: #fff; border-radius: 20px; padding: 5px 11px;
      font-size: 11px; display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .vdot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.45); }
    .vdot.on { background: #7dffb0; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.25;} }

    /* SECCIONES */
    .sec { padding: 14px 16px; }
    .sec-label {
      font-size: 10px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 9px; display: flex; align-items: center; gap: 7px;
    }
    .sec-label::after { content: ''; flex: 1; height: 0.5px; background: var(--brd); }

    /* CARD */
    .card { background: var(--surf); border: 0.5px solid var(--brd); border-radius: var(--r); padding: 14px; margin-bottom: 10px; }

    /* CAMPOS CON MICRÓFONO */
    .frow { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
    .frow:last-child { margin-bottom: 0; }
    .finp {
      flex: 1; font-size: 14px; padding: 9px 12px;
      background: var(--surf2); border: 0.5px solid var(--brd2);
      border-radius: var(--rs); color: var(--txt);
    }
    .finp:focus { outline: none; border-color: var(--h); }

    /* BOTONES MIC */
    .mic {
      width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
      background: var(--hl); color: var(--h);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.18s, transform 0.1s;
    }
    .mic:active { transform: scale(0.92); }
    .mic.on { background: var(--h); color: #fff; animation: pm 1.2s infinite; }
    .mic-sm {
      width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer;
      background: var(--hl); color: var(--h);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.18s;
    }
    .mic-sm.on { background: var(--h); color: #fff; }
    @keyframes pm { 0%,100%{box-shadow:0 0 0 0 rgba(110,62,181,0.35);} 60%{box-shadow:0 0 0 9px rgba(110,62,181,0);} }

    /* PARTIDAS */
    .pitem {
      background: var(--surf); border: 0.5px solid var(--brd);
      border-radius: var(--r); padding: 12px 13px;
      display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px;
    }
    .pico {
      width: 36px; height: 36px; border-radius: 9px;
      background: var(--hl); color: var(--h);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .pbody { flex: 1; min-width: 0; }
    .pname { font-size: 14px; font-weight: 500; margin-bottom: 5px; }
    .pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .pgrid-cell { display: flex; gap: 4px; align-items: center; }
    .pinp {
      flex: 1; font-size: 13px; padding: 7px 9px;
      border-radius: var(--rs); border: 0.5px solid var(--brd2);
      background: var(--surf2); color: var(--txt);
    }
    .pinp:focus { outline: none; border-color: var(--h); }
    .psub { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .psub strong { color: var(--hd); font-weight: 600; }
    .del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 3px; flex-shrink: 0; }

    /* AÑADIR PARTIDA */
    .add-row { display: flex; gap: 8px; margin-top: 4px; }
    .ssel {
      flex: 1; font-size: 13px; padding: 9px 10px;
      background: var(--surf); border: 0.5px solid var(--brd2);
      border-radius: var(--rs); color: var(--txt);
    }
    .badd {
      background: var(--h); color: #fff; border: none;
      padding: 9px 14px; border-radius: var(--rs);
      font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }

    /* TOTALES */
    .twrap { background: var(--surf); border: 0.5px solid var(--brd); border-radius: var(--r); overflow: hidden; }
    .thead { background: var(--hl); padding: 11px 14px; display: flex; justify-content: space-between; align-items: center; }
    .thead span { font-size: 12px; font-weight: 600; color: var(--hd); }
    .tbody { padding: 12px 14px; }
    .trow { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 14px; }
    .trow .lbl { color: var(--muted); }
    .trow .val { font-weight: 500; }
    .irow { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
    .isel {
      font-size: 13px; padding: 5px 8px;
      border-radius: var(--rs); border: 0.5px solid var(--brd2);
      background: var(--surf2); color: var(--txt);
    }
    .divider { border-top: 0.5px solid var(--brd); margin: 6px 0; }
    .grow { display: flex; justify-content: space-between; align-items: center; padding: 8px 0 2px; }
    .grow .lbl { font-size: 15px; font-weight: 500; }
    .grow .val { font-size: 20px; font-weight: 700; color: var(--h); }

    /* BOTONES ACCIÓN */
    .bgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .bout {
      background: none; border: 0.5px solid var(--brd2); color: var(--txt);
      padding: 11px; border-radius: var(--rs); font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .bpdf {
      background: var(--hd); color: #fff; border: none;
      padding: 11px; border-radius: var(--rs); font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .bia {
      background: linear-gradient(90deg, var(--hd), var(--acc2)); color: #fff; border: none;
      padding: 11px; border-radius: var(--rs); font-size: 13px; font-weight: 500;
      cursor: pointer; grid-column: 1 / -1;
    }

    /* BADGE */
    .badge {
      background: var(--h); color: #fff;
      font-size: 10px; padding: 2px 7px; border-radius: 10px; margin-left: 4px;
    }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--hd); color: #fff; padding: 9px 18px;
      border-radius: 20px; font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999; white-space: nowrap;
      box-shadow: 0 4px 16px rgba(60,32,128,0.35);
    }
    .toast.show { opacity: 1; }

    /* INSTALAR PWA */
    #install-btn {
      display: none; position: fixed; bottom: 80px; right: 16px;
      background: var(--h); color: #fff; border: none;
      padding: 12px 18px; border-radius: 30px; font-size: 14px; font-weight: 500;
      cursor: pointer; box-shadow: 0 4px 16px rgba(110,62,181,0.4); z-index: 998;
    }

    /* ESPACIO INFERIOR */
    .bottom-pad { height: 40px; }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>
<button id="install-btn" onclick="instalar()">📱 Añadir a inicio</button>

<!-- CABECERA CON LOGO REAL -->
<div class="header">

      <input class="finp" id="f-cliente" placeholder="Nombre del cliente" type="text">

      <button class="mic" onclick="voz('f-obra')" title="Dictar dirección">

<script>
// ===================== CONFIGURACIÓN PARTIDAS =====================
const CFG = {
  pi: { n:'Pintura interior paredes',  u:'m²',  i:'🪣', p:8  },
  pe: { n:'Pintura exterior fachada',  u:'m²',  i:'🏠', p:14 },
  pt: { n:'Pintura techo',             u:'m²',  i:'✦',  p:9  },
  im: { n:'Imprimación / sellador',    u:'m²',  i:'◎',  p:5  },
  em: { n:'Esmalte en madera',         u:'m²',  i:'◼',  p:18 },
  bz: { n:'Barniz / lasur',            u:'m²',  i:'◻',  p:16 },
  mc: { n:'Microcemento',              u:'m²',  i:'▦',  p:45 },
  gt: { n:'Gotelé / picado',           u:'m²',  i:'◈',  p:12 },
  lj: { n:'Lijado y preparación',      u:'m²',  i:'▣',  p:6  },
  pl: { n:'Plástico liso interior',    u:'m²',  i:'◍',  p:7  },
  es: { n:'Estucado / enlucido',       u:'m²',  i:'◉',  p:22 },
  mt: { n:'Material',                  u:'ud',  i:'📦', p:0  },
  ds: { n:'Desplazamiento',            u:'ud',  i:'◷',  p:25 },
  an: { n:'Andamio',                   u:'día', i:'▮',  p:80 },
  ot: { n:'Otros trabajos',            u:'hora',i:'◐',  p:22 }
};

let parts = [], uid = 0;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null, activeBtn = null;

// ===================== UTILIDADES =====================
function fmt(n) { return n.toFixed(2).replace('.', ',') + ' €'; }

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function setVozUI(on, msg) {
  document.getElementById('vdot').classList.toggle('on', on);
  document.getElementById('vtxt').textContent = on ? msg : 'Voz';
}

// ===================== VOZ — TEXTO =====================
function voz(fieldId) {
  if (!SR) { showToast('Voz no disponible en este navegador'); return; }
  if (recog) { recog.stop(); recog = null; }
  const btn = event.currentTarget;
  if (activeBtn && activeBtn !== btn) activeBtn.classList.remove('on');
  activeBtn = btn; btn.classList.add('on');
  setVozUI(true, 'Escuchando...');
  recog = new SR();
  recog.lang = 'es-ES'; recog.interimResults = false; recog.continuous = false;
  recog.onresult = e => {
    const txt = e.results[0][0].transcript;
    document.getElementById(fieldId).value = txt;
    showToast('✓ "' + txt + '"');
    calc();
  };
  recog.onerror = () => showToast('No se entendió, intenta de nuevo');
  recog.onend = () => { btn.classList.remove('on'); setVozUI(false); recog = null; activeBtn = null; };
  recog.start();
}

// ===================== VOZ — NÚMEROS =====================
function vozNum(id, field) {
  if (!SR) { showToast('Voz no disponible'); return; }
  if (recog) { recog.stop(); recog = null; }
  const btn = event.currentTarget;
  btn.classList.add('on');
  setVozUI(true, 'Di el número...');
  recog = new SR();
  recog.lang = 'es-ES'; recog.interimResults = false; recog.continuous = false;
  recog.onresult = e => {
    let raw = e.results[0][0].transcript;
    raw = raw.replace(/\s/g, '').replace(',', '.').replace(/[^0-9.]/g, '');
    const num = parseFloat(raw) || 0;
    const inp = document.querySelector('[data-id="' + id + '"][data-field="' + field + '"]');
    if (inp) inp.value = num;
    const p = parts.find(x => x.id === id);
    if (p) { p[field] = num; updSub(id); }
    showToast(field === 'q' ? '✓ Cantidad: ' + num : '✓ Precio: ' + num + ' €');
  };
  recog.onerror = () => showToast('No se entendió');
  recog.onend = () => { btn.classList.remove('on'); setVozUI(false); recog = null; };
  recog.start();
}

// ===================== PARTIDAS =====================
function addP() {
  const s = document.getElementById('ssel');
  const k = s.value; if (!k) return;
  const c = CFG[k];
  parts.push({ id: uid++, k, n: c.n, u: c.u, i: c.i, q: 0, p: c.p });
  s.value = ''; render();
}

function delP(id) { parts = parts.filter(x => x.id !== id); render(); }

function updSub(id) {
  const p = parts.find(x => x.id === id); if (!p) return;
  const el = document.getElementById('sub-' + id);
  if (el) el.innerHTML = 'Subtotal: <strong>' + fmt(p.q * p.p) + '</strong>';
  calc();
}

function updP(id, field, v) {
  const p = parts.find(x => x.id === id);
  if (p) { p[field] = parseFloat(v) || 0; updSub(id); }
}

const MIC_SVG = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>';

function render() {
  const list = document.getElementById('lista'); list.innerHTML = '';
  parts.forEach(p => {
    const d = document.createElement('div'); d.className = 'pitem';
    d.innerHTML = `
      <div class="pico">${p.i}</div>
      <div class="pbody">
        <div class="pname">${p.n}</div>
        <div class="pgrid">
          <div class="pgrid-cell">
            <input class="pinp" type="number" min="0" step="0.1"
              placeholder="${p.u}" value="${p.q || ''}"
              data-id="${p.id}" data-field="q"
              oninput="updP(${p.id},'q',this.value)">
            <button class="mic-sm" onclick="vozNum(${p.id},'q')" title="Dictar cantidad">${MIC_SVG}</button>
          </div>
          <div class="pgrid-cell">
            <input class="pinp" type="number" min="0" step="0.01"
              placeholder="€/${p.u}" value="${p.p || ''}"
              data-id="${p.id}" data-field="p"
              oninput="updP(${p.id},'p',this.value)">
            <button class="mic-sm" onclick="vozNum(${p.id},'p')" title="Dictar precio">${MIC_SVG}</button>
          </div>
        </div>
        <div class="psub" id="sub-${p.id}">Subtotal: <strong>${fmt(p.q * p.p)}</strong></div>
      </div>
      <button class="del" onclick="delP(${p.id})">✕</button>`;
    list.appendChild(d);
  });
  document.getElementById('badge-n').textContent = parts.length;
  calc();
}

// ===================== CÁLCULO =====================
function calc() {
  let mo = 0, mat = 0;
  parts.forEach(p => { const s = p.q * p.p; if (p.k === 'mt') mat += s; else mo += s; });
  const base = mo + mat;
  const ivaPct = parseInt(document.getElementById('iva').value) / 100;
  const ivaAmt = base * ivaPct;
  document.getElementById('tt-mo').textContent    = fmt(mo);
  document.getElementById('tt-mat').textContent   = fmt(mat);
  document.getElementById('tt-iva').textContent   = '+ ' + fmt(ivaAmt);
  document.getElementById('tt-total').textContent = fmt(base + ivaAmt);
  const fd = document.getElementById('f-fecha');
  document.getElementById('th-fecha').textContent = fd ? fd.value : '';
}

// ===================== LIMPIAR =====================
function limpiar() {
  if (!confirm('¿Limpiar todo el presupuesto?')) return;
  parts = [];
  ['f-cliente','f-obra','f-obs'].forEach(id => {
    const e = document.getElementById(id); if (e) e.value = '';
  });
  document.getElementById('f-fecha').value = new Date().toLocaleDateString('es-ES');
  render(); showToast('Presupuesto limpiado');
}

// ===================== PDF =====================
function generarPDF() {
  const { jsPDF } = window.jspdf;
  if (!jsPDF) { showToast('Error cargando PDF, intenta de nuevo'); return; }

  const cliente = document.getElementById('f-cliente').value || 'Cliente';
  const obra    = document.getElementById('f-obra').value    || 'Obra';
  const fecha   = document.getElementById('f-fecha').value   || new Date().toLocaleDateString('es-ES');
  const obs     = document.getElementById('f-obs').value     || '';
  const ivaPct  = parseInt(document.getElementById('iva').value);

  const doc = new jsPDF();

  // Cabecera morada
  doc.setFillColor(60, 32, 128);
  doc.rect(0, 0, 210, 28, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(16); doc.setFont('helvetica', 'bold');
  doc.text('PINTURAS HERRERUELA', 15, 12);
  doc.setFontSize(9); doc.setFont('helvetica', 'normal');
  doc.text('Pintura i Decoració · Lleida · pedrosaborrego@gmail.com', 15, 20);

  // Título
  doc.setTextColor(60, 32, 128);
  doc.setFontSize(13); doc.setFont('helvetica', 'bold');
  doc.text('PRESUPUESTO', 15, 38);

  // Datos cliente
  doc.setTextColor(50, 50, 50);
  doc.setFontSize(10); doc.setFont('helvetica', 'normal');
  doc.text('Cliente: ' + cliente, 15, 48);
  doc.text('Obra: ' + obra,       15, 55);
  doc.text('Fecha: ' + fecha,     15, 62);
  if (obs) doc.text('Obs.: ' + obs, 15, 69);

  // Línea separadora
  const startY = obs ? 74 : 67;
  doc.setDrawColor(110, 62, 181);
  doc.setLineWidth(0.4);
  doc.line(15, startY, 195, startY);

  // Cabecera tabla
  let y = startY + 7;
  doc.setFillColor(240, 235, 252);
  doc.rect(15, y - 5, 180, 8, 'F');
  doc.setTextColor(60, 32, 128);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
  doc.text('Concepto',    17, y);
  doc.text('Cant.',      108, y);
  doc.text('Precio',     135, y);
  doc.text('Subtotal',   165, y);
  y += 6;

  // Filas partidas
  doc.setFont('helvetica', 'normal'); doc.setTextColor(40, 40, 40);
  parts.forEach((p, i) => {
    if (y > 265) { doc.addPage(); y = 20; }
    if (i % 2 === 0) { doc.setFillColor(250, 248, 255); doc.rect(15, y - 4, 180, 7, 'F'); }
    doc.setFontSize(9);
    doc.text(p.n.substring(0, 40), 17, y);
    doc.text(String(p.q) + ' ' + p.u, 108, y);
    doc.text(p.p.toFixed(2) + ' €', 135, y);
    doc.text(fmt(p.q * p.p), 165, y);
    y += 7;
  });

  // Totales
  const base = parts.reduce((s, p) => s + p.q * p.p, 0);
  const ivaAmt = base * ivaPct / 100;
  y += 4;
  doc.setDrawColor(110, 62, 181); doc.line(120, y, 195, y); y += 6;
  doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.setTextColor(80, 80, 80);
  doc.text('Base imponible:', 120, y); doc.text(fmt(base), 165, y); y += 6;
  doc.text('IVA (' + ivaPct + ' %):', 120, y); doc.text(fmt(ivaAmt), 165, y); y += 6;
  doc.setFillColor(60, 32, 128); doc.rect(120, y - 5, 75, 9, 'F');
  doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold'); doc.setFontSize(10);
  doc.text('TOTAL:', 122, y + 1); doc.text(fmt(base + ivaAmt), 165, y + 1);

  // Condiciones
  y += 18;
  doc.setTextColor(120, 120, 120); doc.setFontSize(8); doc.setFont('helvetica', 'normal');
  doc.text('Condiciones: 50 % al inicio de la obra · 50 % a la finalización', 15, y);
  doc.text('Validez del presupuesto: 30 días desde la fecha de emisión', 15, y + 5);

  doc.save('presupuesto-herreruela-' + cliente.replace(/\s/g, '-') + '.pdf');
  showToast('✓ PDF guardado correctamente');
}

// ===================== COMPARTIR =====================
function compartir() {
  const cliente = document.getElementById('f-cliente').value || 'Sin nombre';
  const obra    = document.getElementById('f-obra').value    || '';
  const total   = document.getElementById('tt-total').textContent;
  const lineas  = parts.map(p => '• ' + p.n + ': ' + p.q + ' ' + p.u + ' × ' + p.p + '€ = ' + fmt(p.q * p.p)).join('\n');
  const texto = `*Presupuesto Pinturas Herreruela*\nCliente: ${cliente}\nObra: ${obra}\n\n${lineas}\n\n*Total: ${total}*\n\nPintura i Decoració · Lleida`;

  if (navigator.share) {
    navigator.share({ title: 'Presupuesto Herreruela', text: texto });
  } else {
    navigator.clipboard.writeText(texto).then(() => showToast('✓ Copiado al portapapeles'));
  }
}

// ===================== PWA INSTALAR =====================
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'block';
});
function instalar() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      document.getElementById('install-btn').style.display = 'none';
    });
  } else {
    showToast('Menú del navegador → Añadir a pantalla de inicio');
  }
}

// ===================== INIT =====================
document.getElementById('f-fecha').value = new Date().toLocaleDateString('es-ES');
calc();
</script>
